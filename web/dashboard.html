<h2>💰 Dashboard</h2>
<h3 id="bal"></h3>

<button onclick="watch()">🎥 Watch Ad</button>

<script>
const API=location.origin;
let user=localStorage.getItem("uid");

function load(){
fetch(API+"/user/"+user)
.then(r=>r.json())
.then(d=>bal.innerText="Balance: "+d.balance);
}

function watch(){
alert("Watch Ad 15 sec");

setTimeout(()=>{
fetch(API+"/reward",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id:user})
})
.then(r=>r.json())
.then(d=>{
alert(d.success?"Earned":"Error");
load();
});
},15000);
}

load();
</script>
