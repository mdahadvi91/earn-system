<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Pro</title>

<!-- Telegram WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle,#1e293b,#020617);
  color:#fff;
}

.container{padding:15px;}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.balance{
  font-size:30px;
  color:#4ade80;
  font-weight:bold;
}

.btn{
  display:block;
  padding:16px;
  margin-top:15px;
  text-align:center;
  border-radius:15px;
  background: linear-gradient(45deg,#9333ea,#4f46e5);
  color:#fff;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 0 10px #9333ea;
}

.btn:active{
  transform: scale(0.95);
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background: rgba(0,0,0,0.85);
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<div class="container">

<div class="card">
  <h3>ID: <span id="uid">...</span></h3>
  <p class="balance">৳ <span id="bal">0.00</span></p>
</div>

<div class="card">
  <h3>📺 Watch Ads</h3>
  <a class="btn" onclick="watchAd()">▶ Start Earning</a>
</div>

</div>

<div class="bottom">
  <span onclick="go('dashboard.html')">🏠</span>
  <span onclick="go('invite.html')">👥</span>
  <span onclick="go('dashboard.html')">💰</span>
  <span onclick="go('withdraw.html')">💸</span>
</div>

<script>

// ===================== CONFIG =====================
const API = "https://earn-system.onrender.com";

// ===================== TELEGRAM INIT =====================
let tg = window.Telegram.WebApp;
tg.expand();

// ===================== USER SYSTEM =====================
let user;

if(tg.initDataUnsafe && tg.initDataUnsafe.user){
    user = tg.initDataUnsafe.user.id;
} else {
    // fallback for browser
    user = localStorage.getItem("uid");
    if(!user){
        user = Math.floor(Math.random()*100000);
        localStorage.setItem("uid", user);
    }
}

// ===================== LOAD USER =====================
function loadUser(){
  fetch(API + "/user/" + user)
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("uid").innerText = user;
    document.getElementById("bal").innerText = parseFloat(data.balance).toFixed(2);
  })
  .catch(()=>{
    alert("⚠️ Server not connected");
  });
}

loadUser();

// ===================== AD SYSTEM =====================
function watchAd(){

  // disable button (anti spam)
  const btn = document.querySelector(".btn");
  btn.innerText = "⏳ Please wait...";
  btn.style.pointerEvents = "none";

  // open ad
  window.open("https://example.com", "_blank");

  // reward delay
  setTimeout(()=>{

    fetch(API + "/reward",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({id:user, amount:0.5})
    })
    .then(()=>{
      alert("💰 Earned 0.5 BDT");
      loadUser();

      btn.innerText = "▶ Start Earning";
      btn.style.pointerEvents = "auto";
    })
    .catch(()=>{
      alert("❌ Error adding reward");

      btn.innerText = "▶ Start Earning";
      btn.style.pointerEvents = "auto";
    });

  },10000);
}
function go(page){
  window.location.href = "/" + page;
}

  
</script>

</body>
</html>
