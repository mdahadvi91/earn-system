<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Earn Pro</title>

<style>
body{margin:0;background:#0f172a;color:#fff;font-family:sans-serif;}
.top{padding:20px;background:#1e293b;}
.btn{padding:15px;background:#9333ea;margin-top:10px;text-align:center;border-radius:10px;}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#020617;padding:10px;font-size:20px;}
.page{display:none;padding:15px;margin-bottom:80px;}
.card{background:#1e293b;padding:10px;margin:10px;border-radius:10px;}
input,select{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;}
</style>
</head>

<body>

<div class="top">
User: <span id="uid"></span><br>
Balance: <span id="bal">0</span>
</div>

<!-- TASK -->
<div id="task" class="page" style="display:block;">
<h3>🎥 Tasks</h3>
<div class="btn" onclick="watchAd()">Watch Ad</div>
<div class="btn" onclick="buyVIP()">💎 Buy VIP</div>
<div id="tasks"></div>
<canvas id="chart"></canvas>
</div>

<!-- INVITE -->
<div id="invite" class="page">
<h3>👥 Invite</h3>
<div class="card" id="refLink"></div>
</div>

<!-- OFFER -->
<div id="offer" class="page">
<h3>🔥 Offer</h3>
<div class="btn" onclick="openOffer()">Start Offer</div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="page">
<h3>💸 Withdraw</h3>
<input id="amount" placeholder="Amount">
<input id="account" placeholder="Account">
<select id="method">
<option>bkash</option>
<option>nagad</option>
<option>binance</option>
</select>
<div class="btn" onclick="withdraw()">Submit</div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h3>👑 Admin</h3>
<input id="adminPass" placeholder="Password">
<div class="btn" onclick="loadAdmin()">Load</div>
<div id="adminList"></div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('task')">🏠</div>
<div onclick="show('invite')">👥</div>
<div onclick="show('offer')">🔥</div>
<div onclick="show('withdraw')">💰</div>
<div onclick="show('admin')">👑</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// USER
let tg = window.Telegram.WebApp;
let user = tg.initDataUnsafe.user?.id || Math.random().toString(36).substring(2);
uid.innerText = user;

// DEVICE
let device = localStorage.getItem("dev") || Math.random();
localStorage.setItem("dev", device);

// CURRENCY
let symbol="$", rate=1;
let lang=navigator.language;
if(lang.includes("bn")){symbol="৳";rate=120;}
else if(lang.includes("en")){symbol="AED ";rate=3.67;}

// NAV
function show(p){
 document.querySelectorAll(".page").forEach(x=>x.style.display="none");
 document.getElementById(p).style.display="block";
 if(p==="task") loadGraph();
}

// LOAD USER
function load(){
 fetch("/api/user/"+user)
 .then(r=>r.json())
 .then(d=>{
   bal.innerText=(d.balance*rate).toFixed(2)+" "+symbol;
   loadTasks(d.totalAds);
 });
}
setInterval(load,3000);
load();

// WATCH AD
function watchAd(){
 window.open("https://www.profitablecpmratenetwork.com/kxq650wd?key=11d1ec5f3d88b1d9689e0547e8b15dd1");

 setTimeout(()=>{
  fetch("/api/watch",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({id:user,deviceId:device})
  }).then(()=>load());
 },8000);
}

// TASK
let TASKS=[
 {ads:5,reward:0.01},
 {ads:10,reward:0.02},
 {ads:20,reward:0.05}
];

function loadTasks(total){
 let html="";
 TASKS.forEach((t,i)=>{
  let done=total>=t.ads;
  html+=`
  <div class="card">
  ${t.ads} Ads → ${(t.reward*rate).toFixed(2)} ${symbol}<br>
  ${done
    ? `<div class="btn" onclick="claim(${i})">Claim</div>`
    : `<div class="btn" style="background:gray">Locked</div>`}
  </div>`;
 });
 tasks.innerHTML=html;
}

function claim(i){
 fetch("/api/taskReward",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({id:user,index:i})
 })
 .then(r=>r.json())
 .then(d=>{alert(d.msg);load();});
}

// VIP
function buyVIP(){
 fetch("/api/vip",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({id:user})
 }).then(r=>r.json()).then(d=>alert(d.msg));
}

// WITHDRAW
function withdraw(){
 fetch("/api/withdraw",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   id:user,
   amount:amount.value,
   method:method.value,
   account:account.value
  })
 }).then(r=>r.json()).then(d=>alert(d.msg));
}

// OFFER
function openOffer(){
 window.open("https://www.cpagrip.com/showoffers.php?subid="+user);
}

// INVITE
refLink.innerText=location.origin+"?ref="+user;

// ADMIN
function loadAdmin(){
 fetch("/api/admin/withdraws?pass="+adminPass.value)
 .then(r=>r.json())
 .then(data=>{
  let html="";
  data.forEach((w,i)=>{
    html+=`
    <div class="card">
    ${w.id} - ${w.amount}<br>
    ${w.method} - ${w.account}<br>
    <div class="btn" onclick="approve(${i})">Approve</div>
    </div>`;
  });
  adminList.innerHTML=html;
 });
}

function approve(i){
 fetch("/api/admin/approve",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({index:i,pass:adminPass.value})
 }).then(loadAdmin);
}

// GRAPH
function loadGraph(){
 fetch("/api/earn-graph/"+user)
 .then(r=>r.json())
 .then(data=>{
  let labels=data.map(x=>new Date(x.time).toLocaleTimeString());
  let values=data.map(x=>x.amount);

  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{labels,datasets:[{label:"Earnings",data:values}]}
  });
 });
}

</script>

</body>
</html>
