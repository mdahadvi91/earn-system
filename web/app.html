<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Earn Pro</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
}
.top{
  margin:10px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}
.card{
  margin:10px;
  padding:15px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
}
.btn{
  padding:18px;
  border-radius:16px;
  background:linear-gradient(45deg,#9333ea,#4f46e5);
  text-align:center;
  margin-top:10px;
}
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#020617;
  padding:12px;
}
.nav div{font-size:22px;}
.page{display:none;padding:15px;margin-bottom:80px;}
input,select{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:none;}
#popup{
position:fixed;top:20px;left:50%;transform:translateX(-50%);
background:#16a34a;padding:10px 20px;border-radius:10px;display:none;
}
</style>
</head>

<body>

<script src="https://pl29010405.profitablecpmratenetwork.com/03/60/2c/03602c436b7c471195a5771cbb6aed7a.js"></script>

<div id="popup"></div>

<div class="top">
User: <span id="uid"></span><br>
Balance: <span id="bal">0</span>
</div>

<div class="card">
🎥 Ads: <span id="ads">0</span>
</div>

<div id="task" class="page" style="display:block;">
<h3>🎯 Tasks</h3>
<div class="btn" onclick="watchAd()">Watch Ad</div>
<div id="tasks"></div>
</div>

<div id="withdraw" class="page">
<h3>💸 Withdraw</h3>

<select id="method">
<option>bkash</option>
<option>nagad</option>
<option>binance</option>
</select>

<input id="account" placeholder="Account">
<input id="amount" placeholder="Amount">

<div class="btn" onclick="withdraw()">Submit</div>
</div>

<div class="nav">
<div onclick="showPage('task')">🏠</div>
<div onclick="showPage('withdraw')">💰</div>
</div>

<script>

// ================= USER =================
let tg = window.Telegram.WebApp;
let user = tg.initDataUnsafe.user?.id || "test";
uid.innerText = user;

// ================= DEVICE =================
let device = localStorage.getItem("dev") || Math.random();
localStorage.setItem("dev",device);

// ================= AUTO CURRENCY =================
let currency = "BDT";
let symbol = "৳";
let rate = 120;

// UAE detect
if(navigator.language.includes("en")){
  currency = "AED";
  symbol = "AED ";
  rate = 3.67;
}

// ================= BALANCE =================
function loadUser(){
 fetch("/api/user/"+user)
 .then(r=>r.json())
 .then(d=>{
   let money = d.balance * rate;
   bal.innerText = money.toFixed(2)+" "+symbol;

   ads.innerText = d.totalAds;
   loadTasks(d.totalAds);
 });
}
setInterval(loadUser,5000);
loadUser();

// ================= POPUP =================
function popup(t){
 popupDiv.innerText=t;
 popupDiv.style.display="block";
 setTimeout(()=>popupDiv.style.display="none",2000);
}

// ================= WATCH =================
function watchAd(){
 window.open("https://www.profitablecpmratenetwork.com/kxq650wd?key=11d1ec5f3d88b1d9689e0547e8b15dd1");

 setTimeout(()=>{
   fetch("/api/watch",{
     method:"POST",
     headers:{"Content-Type":"application/json"},
     body:JSON.stringify({id:user,device})
   })
   .then(r=>r.json())
   .then(()=>{
     popup("Ad counted ✅");
     loadUser();
   });
 },8000);
}

// ================= TASK =================
let TASKS = [
 {ads:5,reward:0.01},
 {ads:10,reward:0.02},
 {ads:20,reward:0.05}
];

function loadTasks(total){
 let html="";
 TASKS.forEach((t,i)=>{
   let done = total>=t.ads;

   html+=`
   <div class="card">
   ${t.ads} Ads → ${(t.reward*rate).toFixed(2)} ${symbol}<br>
   ${
     done
     ? `<div class="btn" onclick="claim(${i})">Claim</div>`
     : `<div class="btn" style="background:gray">Locked</div>`
   }
   </div>`;
 });
 tasks.innerHTML=html;
}

// ================= CLAIM =================
function claim(i){
 fetch("/api/taskReward",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({id:user,index:i})
 })
 .then(r=>r.json())
 .then(d=>{
   popup(d.msg);
   loadUser();
 });
}

// ================= WITHDRAW =================
function withdraw(){
 fetch("/api/withdraw",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
     id:user,
     amount:amount.value,
     method:method.value,
     account:account.value
   })
 })
 .then(r=>r.json())
 .then(d=>popup(d.msg));
}

// ================= NAV =================
function showPage(p){
 document.querySelectorAll(".page").forEach(x=>x.style.display="none");
 document.getElementById(p).style.display="block";
}

</script>

</body>
</html>
