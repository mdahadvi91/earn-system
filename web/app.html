<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Earn Pro</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
}
.top{
  margin:10px;
  padding:20px;
  border-radius:20px;
  background:linear-gradient(45deg,#1e293b,#7c3aed);
}
.card{
  margin:10px;
  padding:15px;
  background:#1e293b;
  border-radius:20px;
}
.btn{
  padding:15px;
  border-radius:12px;
  background:linear-gradient(45deg,#9333ea,#4f46e5);
  text-align:center;
  margin-top:10px;
}
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
.page{
  display:none;
  padding:15px;
  margin-bottom:70px;
}
input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}
.loading{
  text-align:center;
  margin-top:10px;
  color:#facc15;
}
</style>
</head>

<body>

<!-- Adsterra -->
<script src="https://pl29010405.profitablecpmratenetwork.com/03/60/2c/03602c436b7c471195a5771cbb6aed7a.js"></script>

<div class="top">
User ID: <span id="uid"></span><br>
Balance: <span id="bal">0</span> USDT
</div>

<!-- 📊 Analytics -->
<div class="card">
🎥 Ads Watched: <span id="adsWatched">0</span>
</div>

<!-- ================= PAGES ================= -->

<div id="task" class="page" style="display:block;">
  <h3>🎥 Task</h3>
  <div class="btn" onclick="watchAd()">Watch Ad</div>
  <div id="status" class="loading"></div>
</div>

<div id="invite" class="page">
  <h3>👥 Invite</h3>
  <p>Your referral link:</p>
  <div class="card" id="refLink"></div>
</div>

<div id="withdraw" class="page">
  <h3>💸 Withdraw</h3>

  <select id="method">
    <option value="bkash">Bkash</option>
    <option value="nagad">Nagad</option>
    <option value="binance">Binance</option>
  </select>

  <input id="account" placeholder="Number / Wallet">
  <input id="amount" placeholder="Amount">

  <div class="btn" onclick="withdraw()">Submit</div>
</div>

<div id="leaderboard" class="page">
  <h3>🏆 Leaderboard</h3>
  <div id="leaderboardList"></div>
</div>

<div id="offerwall" class="page">
  <h3>🔥 Offerwall</h3>
  <div id="offers"></div>
</div>

<!-- ================= NAV ================= -->
<div class="nav">
  <div onclick="showPage('task')">🏠</div>
  <div onclick="showPage('invite')">👥</div>
  <div onclick="showPage('withdraw')">💰</div>
  <div onclick="showPage('leaderboard')">🏆</div>
  <div onclick="showPage('offerwall')">🔥</div>
</div>

<!-- ================= SCRIPT ================= -->
<script>

let tg = window.Telegram.WebApp;
let user = tg.initDataUnsafe.user?.id || "test_user";

document.getElementById("uid").innerText = user;

// 🔐 DEVICE ID
let device = localStorage.getItem("device_id");
if(!device){
  device = Math.random().toString(36).substring(2);
  localStorage.setItem("device_id", device);
}

// 📊 LOAD ANALYTICS
let adCount = parseInt(localStorage.getItem("ad_count")) || 0;

function updateAnalytics(){
  document.getElementById("adsWatched").innerText = adCount;
}
updateAnalytics();

// page switch
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";

  if(page=="leaderboard") loadLeaderboard();
  if(page=="offerwall") loadOffers();
}

// 💰 LOAD USER
function loadUser(){
  fetch("/api/user/"+user)
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("bal").innerText = d.balance.toFixed(4);
  });
}

setInterval(loadUser, 5000);
loadUser();

// 🎥 WATCH AD SYSTEM
let lastAdTime = 0;

function watchAd(){

  let now = Date.now();

  if(now - lastAdTime < 15000){
    alert("⏳ Wait 15 sec");
    return;
  }

  lastAdTime = now;

  document.getElementById("status").innerText = "🎥 Opening ad...";

  // 🔥 OPEN AD
  window.open("https://www.profitablecpmratenetwork.com/kxq650wd?key=11d1ec5f3d88b1d9689e0547e8b15dd1","_blank");

  // ⏳ WAIT + REWARD
  setTimeout(()=>{

    document.getElementById("status").innerText = "💰 Getting reward...";

    fetch("/api/reward",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        id:user,
        device:device
      })
    })
    .then(r=>r.json())
    .then(d=>{
      alert(d.msg);

      adCount++;
      localStorage.setItem("ad_count", adCount);
      updateAnalytics();

      loadUser();

      // 🔥 BONUS
      if(adCount % 5 === 0){
        alert("🔥 BONUS +0.005 USDT");
      }

      document.getElementById("status").innerText = "";
    });

  }, 10000);
}

// 💸 WITHDRAW
function withdraw(){
  let amount = document.getElementById("amount").value;
  let account = document.getElementById("account").value;
  let method = document.getElementById("method").value;

  fetch("/api/withdraw",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id:user,
      amount,
      account,
      method
    })
  })
  .then(r=>r.json())
  .then(d=>{
    alert(d.msg);
  });
}

// 🏆 LEADERBOARD
function loadLeaderboard(){
  fetch("/api/leaderboard")
  .then(r=>r.json())
  .then(data=>{
    let html="";
    data.forEach(u=>{
      html+=`<div class="card">${u.userId} - ${u.balance.toFixed(3)}</div>`;
    });
    document.getElementById("leaderboardList").innerHTML = html;
  });
}

// 🔥 OFFERS
function loadOffers(){
  fetch("/api/offers")
  .then(r=>r.json())
  .then(data=>{
    let html="";
    data.forEach(o=>{
      html+=`<div class="card">
        ${o.title}<br>
        💰 ${o.reward}
        <div class="btn" onclick="window.open('${o.link}')">Start</div>
      </div>`;
    });
    document.getElementById("offers").innerHTML = html;
  });
}

// 👥 REF LINK
document.getElementById("refLink").innerText =
  window.location.origin + "?ref=" + user;

</script>

</body>
</html>
