<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Earn Pro</title>

<style>
body{margin:0;background:#0f172a;color:#fff;font-family:sans-serif;}
.top{padding:20px;text-align:center;background:#1e293b;}
.btn{padding:15px;background:#9333ea;margin-top:10px;text-align:center;border-radius:10px;}
.card{background:#1e293b;padding:10px;margin:10px;border-radius:10px;}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#020617;padding:12px;font-size:22px;}
.page{display:none;padding:15px;margin-bottom:80px;text-align:center;}
</style>
</head>

<body>

<div class="top">
User: <span id="uid"></span><br>
Balance: <span id="bal">0</span>
</div>

<div id="task" class="page" style="display:block;">
<h3>🎥 Watch & Earn</h3>
<div class="btn" onclick="watchAd()">Watch Ad</div>
<div id="tasks"></div>
<canvas id="earnChart"></canvas>
</div>

<div id="invite" class="page">
<h3>👥 Invite</h3>
<div>Total Users: <span id="totalUsers"></span></div>
<div id="refLink"></div>
<div id="refUsers"></div>
</div>

<div id="leaderboard" class="page">
<h3>🏆 Leaderboard</h3>
<div id="leaderList"></div>
</div>

<div id="withdraw" class="page">
<h3>💸 Withdraw</h3>
<input id="amount">
<input id="account">
<select id="method"><option>bkash</option></select>
<div class="btn" onclick="withdraw()">Submit</div>
<div id="withdrawList"></div>
</div>

<div id="admin" class="page">
<input id="adminPass">
<div class="btn" onclick="loadAdmin()">Load</div>
<div id="adminList"></div>
</div>

<div class="nav">
<div onclick="show('task')">🏠</div>
<div onclick="show('invite')">👥</div>
<div onclick="show('leaderboard')">🏆</div>
<div onclick="show('withdraw')">💰</div>
<div onclick="show('admin')">👑</div>
</div>

<script>

let user = Math.random().toString(36).substring(2);
uid.innerText = user;

let device = localStorage.getItem("dev") || Math.random();
localStorage.setItem("dev", device);

function show(p){
 document.querySelectorAll(".page").forEach(x=>x.style.display="none");
 document.getElementById(p).style.display="block";

 if(p==="invite") loadInvite();
 if(p==="leaderboard") loadLeaderboard();
}

function load(){
 fetch("/api/user/"+user)
 .then(r=>r.json())
 .then(d=>{
  bal.innerText=d.balance.toFixed(4);
  loadTasks(d.totalAds);
  loadGraph();
 });
}
setInterval(load,3000);
load();

function watchAd(){
 window.open("https://www.profitablecpmratenetwork.com/kxq650wd?key=11d1ec5f3d88b1d9689e0547e8b15dd1");

 setTimeout(()=>{
  fetch("/api/watch",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({id:user,deviceId:device})
  });
 },8000);
}

let TASKS=[{ads:5,reward:0.01},{ads:10,reward:0.02}];

function loadTasks(total){
 let html="";
 TASKS.forEach((t,i)=>{
  html+=`<div class="card">${t.ads} Ads <div class="btn" onclick="claim(${i})">Claim</div></div>`;
 });
 tasks.innerHTML=html;
}

function claim(i){
 fetch("/api/taskReward",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({id:user,index:i})});
}

function loadGraph(){
 fetch("/api/earn-graph/"+user)
 .then(r=>r.json())
 .then(d=>{
  let labels=d.map(x=>new Date(x.time).toLocaleTimeString());
  let values=d.map(x=>x.amount);

  new Chart(document.getElementById("earnChart"),{
   type:"line",
   data:{labels,datasets:[{data:values}]}
  });
 });
}

function loadInvite(){
 fetch("/api/invite/"+user)
 .then(r=>r.json())
 .then(d=>{
  totalUsers.innerText=d.total;
  refLink.innerText=location.origin+"?ref="+user;

  let html="";
  d.users.forEach(u=>html+=`<div class="card">${u}</div>`);
  refUsers.innerHTML=html;
 });
}

function loadLeaderboard(){
 fetch("/api/leaderboard")
 .then(r=>r.json())
 .then(d=>{
  let html="";
  d.forEach(u=>html+=`<div class="card">${u.userId} - ${u.balance}</div>`);
  leaderList.innerHTML=html;
 });
}

function withdraw(){
 fetch("/api/withdraw",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({id:user,amount:amount.value,method:method.value,account:account.value})});
}

function loadAdmin(){
 fetch("/api/admin/withdraws?pass="+adminPass.value)
 .then(r=>r.json())
 .then(d=>{
  let html="";
  d.forEach((w,i)=>{
   html+=`<div class="card">${w.id} - ${w.amount}
   <div class="btn" onclick="approve(${i})">Approve</div></div>`;
  });
  adminList.innerHTML=html;
 });
}

function approve(i){
 fetch("/api/admin/approve",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({index:i,pass:adminPass.value})});
}

</script>

</body>
</html>
