<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Pro</title>

<style>
body{
 margin:0;
 background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
 color:#fff;
 font-family:sans-serif;
}
.top{padding:15px;text-align:center;background:#1e293b;}
.container{max-width:500px;margin:auto;}
.btn{padding:14px;background:#9333ea;margin-top:10px;border-radius:10px;text-align:center;}
.card{background:#1e293b;padding:10px;margin:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="top">
User: <span id="uid"></span><br>
Balance: $<span id="bal">0</span>
</div>

<div class="container">

<div class="btn" onclick="openOffer()">🎯 Complete Tasks</div>
<div class="btn" onclick="dailyBonus()">🎁 Daily Bonus</div>

<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>

<h3>💸 Withdraw</h3>
<input id="amount" placeholder="Amount">
<select id="method">
<option>bkash</option>
<option>nagad</option>
<option>usdt</option>
</select>
<input id="account" placeholder="Account">
<div class="btn" onclick="withdraw()">Submit</div>

</div>

<script>

let user = Math.random().toString(36).substring(2);
uid.innerText = user;

// ===== LOAD =====
function load(){
 fetch("/api/user/"+user)
 .then(r=>r.json())
 .then(d=>{
   bal.innerText = d.balance.toFixed(2);
 });
}
setInterval(load,3000);
load();

// ===== OFFER =====
function openOffer(){
 let link="https://wall.wannads.com/wall?apiKey=YOUR_API_KEY&userId="+user;
 window.open(link,"_blank");

 fetch("/api/watch",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({id:user,deviceId:"web"})
 });
}

// ===== BONUS =====
function dailyBonus(){
 fetch("/api/daily-bonus",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({id:user})
 });
}

// ===== LEADERBOARD =====
function loadLeaderboard(){
 fetch("/api/leaderboard")
 .then(r=>r.json())
 .then(data=>{
   let html="";
   data.forEach((u,i)=>{
     html+=`<div class="card">#${i+1} ${u._id} - $${u.total.toFixed(2)}</div>`;
   });
   leaderboard.innerHTML=html;
 });
}
setInterval(loadLeaderboard,5000);

// ===== WITHDRAW =====
function withdraw(){
 fetch("/api/withdraw",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    id:user,
    amount:amount.value,
    method:method.value,
    account:account.value
  })
 });
}

</script>

</body>
</html>
