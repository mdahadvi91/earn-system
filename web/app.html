<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Earn Pro</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
}

/* header */
.top{
  margin:10px;
  padding:20px;
  border-radius:20px;
  background:linear-gradient(45deg,#1e293b,#7c3aed);
}

.balance{
  color:#22c55e;
  font-size:22px;
}

/* card */
.card{
  margin:10px;
  padding:15px;
  background:#1e293b;
  border-radius:20px;
}

/* button */
.btn{
  padding:15px;
  border-radius:12px;
  background:linear-gradient(45deg,#9333ea,#4f46e5);
  text-align:center;
  margin-top:10px;
}

/* nav */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#020617;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">
ID: <span id="uid"></span><br>
Balance: <span class="balance" id="bal">0</span> USDT
</div>

<!-- TASK -->
<div id="task" class="card">
<h3>🎥 Watch Ads & Earn</h3>

<p>Reward per ad: 0.001 – 0.003 USDT</p>

<div class="btn" onclick="watch()">▶ Watch Ad</div>

<!-- REAL ADS PLACE -->
<div style="margin-top:10px">
<!-- Replace this with your Adsterra code -->
<script src="//your-adsterra-script.js"></script>
</div>

</div>

<!-- OFFER -->
<div id="offer" class="card" style="display:none">
<h3>🔥 Offers (High Earning)</h3>
<div id="offers"></div>
</div>

<!-- INVITE -->
<div id="invite" class="card" style="display:none">
<h3>👥 Invite & Earn</h3>

<input id="link" style="width:100%;padding:10px;border-radius:10px">

<p>Total Referrals: <span id="refs">0</span></p>

<div class="btn" onclick="copy()">Copy Link</div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="card" style="display:none">
<h3>💰 Withdraw USDT</h3>

<input id="amount" placeholder="Amount" style="width:100%;margin:5px 0">
<input id="addr" placeholder="USDT Wallet Address" style="width:100%;margin:5px 0">

<div class="btn" onclick="wd()">Request Withdraw</div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('task')">🏠</div>
<div onclick="show('offer')">🔥</div>
<div onclick="show('invite')">👥</div>
<div onclick="show('withdraw')">💰</div>
</div>

<script>
let tg = window.Telegram.WebApp;
let user = tg.initDataUnsafe.user.id;

uid.innerText = user;

// LOAD USER
function load(){
fetch("/user/"+user)
.then(r=>r.json())
.then(d=>{
bal.innerText = d.balance.toFixed(4);
refs.innerText = d.referrals;
link.value = "https://t.me/YOUR_BOT?start=" + user;
});
}

// WATCH AD
function watch(){
alert("Watch full ad (15 sec)");

setTimeout(()=>{
fetch("/reward",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id:user})
})
.then(r=>r.json())
.then(d=>{
if(d.success){
alert("Earned "+d.reward.toFixed(4)+" USDT");
}else{
alert(d.error);
}
load();
});
},15000);
}

// OFFERS
function loadOffers(){
fetch("/offers")
.then(r=>r.json())
.then(data=>{
offers.innerHTML="";
data.forEach(o=>{
offers.innerHTML+=`
<div class="card">
${o.title}<br>
Reward: ${o.reward} USDT
<div class="btn" onclick="go('${o.link}')">Start</div>
</div>`;
});
});
}

function go(link){
window.open(link);
}

// WITHDRAW
function wd(){
fetch("/withdraw",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
id:user,
amount:amount.value,
number:addr.value
})
})
.then(r=>r.json())
.then(d=>{
alert(d.success?"Request Sent":"Error");
});
}

// COPY
function copy(){
navigator.clipboard.writeText(link.value);
alert("Copied");
}

// NAV
function show(x){
task.style.display="none";
offer.style.display="none";
invite.style.display="none";
withdraw.style.display="none";

document.getElementById(x).style.display="block";

if(x==="offer") loadOffers();
}

load();
</script>

</body>
</html>
