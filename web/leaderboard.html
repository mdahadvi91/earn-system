<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#020617;
  color:#fff;
  font-family:sans-serif;
  padding:15px;
}

.card{
  background: rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

.top1{color:gold;}
.top2{color:silver;}
.top3{color:#cd7f32;}

.me{
  border:2px solid #22c55e;
}
</style>
</head>

<body>

<h2>🏆 Leaderboard</h2>

<button onclick="loadAll()">All</button>
<button onclick="loadDaily()">Daily</button>
<button onclick="loadWeekly()">Weekly</button>
<button onclick="loadRef()">Referral</button>

<h3 id="myrank"></h3>

<div id="list"></div>

<script>
const API="https://earn-system.onrender.com";
let user=localStorage.getItem("uid");

// ================= LOAD =================
function loadAll(){
fetch(API+"/leaderboard").then(r=>r.json()).then(show);
}

function loadDaily(){
fetch(API+"/leaderboard/daily").then(r=>r.json()).then(show);
}

function loadWeekly(){
fetch(API+"/leaderboard/weekly").then(r=>r.json()).then(show);
}

function loadRef(){
fetch(API+"/leaderboard/referral").then(r=>r.json()).then(showRef);
}

// ================= SHOW =================
function show(data){

let html="";

data.forEach((u,i)=>{
let cls="";
if(i==0) cls="top1";
if(i==1) cls="top2";
if(i==2) cls="top3";

let me = (u.userId==user) ? "me" : "";

html+=`
<div class="card ${cls} ${me}">
#${i+1} 👤 ${u.userId}<br>
💰 ${u.balance}
</div>
`;
});

list.innerHTML=html;
}

// ================= REF =================
function showRef(data){
let html="";

data.forEach((u,i)=>{
html+=`
<div class="card">
#${i+1} 👥 ${u._id} <br>
Invites: ${u.total}
</div>
`;
});

list.innerHTML=html;
}

// ================= MY RANK =================
fetch(API+"/rank/"+user)
.then(r=>r.json())
.then(d=>{
myrank.innerText="Your Rank: "+d.rank;
});

// default
loadAll();
</script>

</body>
</html>
