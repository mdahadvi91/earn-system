<div style="padding:15px;">

  <h2>💰 OfferWall</h2>
  <p>Complete offers & earn real USDT 🚀</p>

  <div id="offersBox"></div>

</div>

<script>
function loadOffers(){

  let uid = user;

  let offers = [
    {
      name: "🔥 Premium Survey",
      reward: "Up to 2.5 USDT",
      link: "https://www.cpagrip.com/show.php?l=12345"
    },
    {
      name: "🎮 Play Game Offer",
      reward: "Up to 1.8 USDT",
      link: "https://www.cpagrip.com/show.php?l=67890"
    },
    {
      name: "📱 Install App",
      reward: "Up to 3.0 USDT",
      link: "https://www.cpagrip.com/show.php?l=54321"
    }
  ];

  let html = "";

  offers.forEach(o=>{
    html += `
      <div class="card">
        <h3>${o.name}</h3>
        <p>💰 ${o.reward}</p>
        <button class="btn" onclick="startOffer('${o.link}')">
          Start Now 🚀
        </button>
      </div>
    `;
  });

  document.getElementById("offersBox").innerHTML = html;
}

function startOffer(link){
  let uid = user;
  let final = link + "&tracking_id=" + uid;
  window.open(final, "_blank");
}

loadOffers();
</script>
