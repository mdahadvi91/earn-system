<div style="padding:15px;">

  <h2>💰 Extra Earn</h2>
  <p>Complete offers & earn real USDT 🚀</p>

  <!-- Monetag ONLY HERE -->
  <script src="https://quge5.com/88/tag.min.js" data-zone="224604" async data-cfasync="false"></script>

  <div id="offersBox"></div>

</div>

<script>
function getUserId(){
  let uid = localStorage.getItem("uid");

  if(!uid){
    uid = Math.floor(Math.random()*1000000);
    localStorage.setItem("uid", uid);
  }

  return uid;
}

function loadOffers(){

  let offers = [
    {
      name: "🔥 Premium Survey",
      reward: "Up to 2.5 USDT",
      link: "https://www.cpagrip.com/show.php?l=12345"
    },
    {
      name: "🎮 Play Game",
      reward: "Up to 1.8 USDT",
      link: "https://www.cpagrip.com/show.php?l=67890"
    }
  ];

  let html = "";

  offers.forEach(o=>{
    html += `
      <div class="card">
        <h3>${o.name}</h3>
        <p>${o.reward}</p>
        <button class="btn" onclick="startOffer('${o.link}')">Start</button>
      </div>
    `;
  });

  document.getElementById("offersBox").innerHTML = html;
}

function startOffer(link){
  let uid = getUserId();
  window.open(link + "&tracking_id=" + uid, "_blank");
}

setTimeout(loadOffers, 300);
</script>
