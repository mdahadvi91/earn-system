<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
  background:#020617;
  color:#fff;
  font-family:sans-serif;
  padding:10px;
}
input,button{
  padding:10px;
  margin:5px;
  border-radius:10px;
}
.card{
  background:#1e293b;
  padding:10px;
  margin:10px 0;
  border-radius:15px;
}
.btn{
  padding:8px 12px;
  margin-top:5px;
  border-radius:10px;
  background:#22c55e;
  color:#000;
}
.red{
  background:#ef4444;
}
</style>
</head>

<body>

<h2>👑 Admin Panel</h2>

<input id="pass" placeholder="Admin Password">
<button onclick="loadUsers()">Load Users</button>
<button onclick="loadWithdraws()">Withdraw Requests</button>

<div id="data"></div>

<script>
const API = "/api";

// 🔥 LOAD USERS
function loadUsers(){

  let pass = document.getElementById("pass").value;

  fetch(API+"/admin/users?pass="+pass)
  .then(r=>r.json())
  .then(users=>{
    
    let html = "<h3>Users</h3>";

    users.forEach(u=>{
      html += `
      <div class="card">
        ID: ${u.userId} <br>
        Balance: ${u.balance.toFixed(4)} <br>
        Referrals: ${u.referrals} <br>
        Ads: ${u.totalAds}
      </div>
      `;
    });

    data.innerHTML = html;
  });
}

// 🔥 LOAD WITHDRAWS
function loadWithdraws(){

  let pass = document.getElementById("pass").value;

  fetch(API+"/admin/withdraws?pass="+pass)
  .then(r=>r.json())
  .then(list=>{

    let html = "<h3>Withdraw Requests</h3>";

    list.forEach((w,i)=>{
      html += `
      <div class="card">
        ID: ${w.id} <br>
        Amount: ${w.amount} USDT <br>
        Wallet: ${w.address} <br>
        Status: ${w.status} <br>

        <button class="btn" onclick="approve(${i})">Approve</button>
        <button class="btn red" onclick="reject(${i})">Reject</button>
      </div>
      `;
    });

    data.innerHTML = html;
  });
}

// ✅ APPROVE
function approve(i){
  let pass = document.getElementById("pass").value;

  fetch(API+"/admin/approve",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({index:i,pass})
  })
  .then(r=>r.json())
  .then(()=>{
    alert("Approved");
    loadWithdraws();
  });
}

// ❌ REJECT
function reject(i){
  let pass = document.getElementById("pass").value;

  fetch(API+"/admin/reject",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({index:i,pass})
  })
  .then(r=>r.json())
  .then(()=>{
    alert("Rejected");
    loadWithdraws();
  });
}
</script>

</body>
</html>
