<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:#fff;
}

.container{
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

input,button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  background:#9333ea;
  color:#fff;
}

.approve{
  background:#22c55e;
}

.reject{
  background:#ef4444;
}
</style>
</head>

<body>

<div class="container">

<h2>👑 Admin Panel</h2>

<div class="card">
  <input id="pass" placeholder="Enter Password">
  <button onclick="load()">Login</button>
</div>

<div id="list"></div>

</div>

<script>

const API = "https://earn-system.onrender.com";

function load(){
  let pass = document.getElementById("pass").value;

  fetch(API + "/admin/withdraws?pass=" + pass)
  .then(res=>res.json())
  .then(data=>{
    let html = "";

    data.forEach((w, i)=>{
      html += `
      <div class="card">
        <p><b>ID:</b> ${w.id}</p>
        <p><b>Amount:</b> ${w.amount}</p>
        <p><b>Method:</b> ${w.method}</p>
        <p><b>Number:</b> ${w.number}</p>

        <button class="approve" onclick="approve(${i})">✅ Approve</button>
        <button class="reject" onclick="reject(${i})">❌ Reject</button>
      </div>
      `;
    });

    document.getElementById("list").innerHTML = html;
  });
}

function approve(i){
  alert("✅ Approved (demo)");
}

function reject(i){
  alert("❌ Rejected (demo)");
}

</script>

</body>
</html>
