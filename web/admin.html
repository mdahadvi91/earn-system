<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
  background:#020617;
  color:#fff;
  font-family:sans-serif;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:15px;
  margin:10px;
  border-radius:15px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  color:#fff;
}

.approve{background:#22c55e;}
.reject{background:#ef4444;}
</style>
</head>

<body>

<h2 style="text-align:center">👑 Admin Panel</h2>

<input id="pass" placeholder="Password" style="width:90%;margin:10px;padding:10px">

<button onclick="load()" style="width:90%;margin:10px;padding:10px;background:#9333ea;color:white">
Login
</button>

<div id="list"></div>

<script>

const API = "https://earn-system.onrender.com";
let password = "";

function load(){
  password = document.getElementById("pass").value;

  fetch(API + "/admin/withdraws?pass=" + password)
  .then(res=>res.json())
  .then(data=>{
    let html = "";

    data.forEach((w, i)=>{
      html += `
      <div class="card">
        <p>ID: ${w.id}</p>
        <p>Amount: ${w.amount}</p>
        <p>${w.method} - ${w.number}</p>
        <p>Status: ${w.status}</p>

        <button class="approve" onclick="approve(${i})">Approve</button>
        <button class="reject" onclick="reject(${i})">Reject</button>
      </div>
      `;
    });

    document.getElementById("list").innerHTML = html;
  });
}

function approve(i){
  fetch(API + "/admin/approve",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ index:i, pass:password })
  })
  .then(()=> load());
}

function reject(i){
  fetch(API + "/admin/reject",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ index:i, pass:password })
  })
  .then(()=> load());
}

</script>

</body>
</html>
