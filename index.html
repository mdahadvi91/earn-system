<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealEarn - Start Earning</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url('bg.jpg') no-repeat center/cover;
overflow:hidden;
color:white;
}

/* PARTICLE */
canvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
pointer-events:none;
}

/* MAIN */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

/* GLASS BOX */
.box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:30px;
padding:40px 25px;
max-width:700px;
width:100%;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* TEXT */
h1{
font-size:38px;
font-weight:800;
margin-bottom:15px;
}

p{
font-size:16px;
color:#ddd;
margin-bottom:25px;
}

/* BUTTON */
.btn{
background:linear-gradient(90deg,#ff4d00,#ff8800);
padding:16px 40px;
border:none;
border-radius:40px;
font-size:18px;
font-weight:600;
color:white;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
}

/* FOOTER */
footer{
position:fixed;
bottom:0;
width:100%;
padding:12px;
text-align:center;
color:white;
background:rgba(0,0,0,0.35);
}

.footer-menu{
display:flex;
justify-content:space-around;
margin-bottom:6px;
}

.footer-menu span{
font-size:14px;
}
</style>
</head>

<body>

<canvas id="three"></canvas>

<div class="hero">
<div class="box">
<h1>Earn Real Money Daily</h1>
<p>Watch ads • Complete tasks • Earn rewards instantly</p>

<button class="btn" onclick="window.location.href='login.html'">
Start Earning →
</button>

<p style="margin-top:20px;font-size:14px;">
✅ No Investment • 100% Free Platform
</p>
</div>
</div>

<footer>
<div class="footer-menu">
<span>About</span>
<span>Privacy</span>
<span>Support</span>
<span>Contact</span>
</div>
⚡ Secure • Fast • Trusted earning platform
</footer>

<script>
/* SAME PARTICLES AS HOME */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("three"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

const geo=new THREE.BufferGeometry();
const count=500;
const pos=new Float32Array(count*3);

for(let i=0;i<count*3;i++){
pos[i]=(Math.random()-0.5)*10;
}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
const mat=new THREE.PointsMaterial({size:0.03,color:0x00ffff});
const pts=new THREE.Points(geo,mat);

scene.add(pts);
camera.position.z=5;

function anim(){
requestAnimationFrame(anim);
pts.rotation.y+=0.001;
renderer.render(scene,camera);
}
anim();
</script>

</body>
</html>
