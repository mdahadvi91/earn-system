<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RealEarn Auth</title>

<!-- ICON -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
overflow:hidden;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')
no-repeat center/cover;
}

/* BG */
canvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:0;
}

/* CENTER */
.wrap{
height:100%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
z-index:2;
}

/* BOX */
.box{
width:420px;
max-width:95%;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(20px);
border-radius:20px;
padding:30px;
color:white;
}

/* FORMS */
.form{display:none;}
.form.active{display:block;}

/* INPUT */
input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
background:rgba(0,0,0,0.7);
color:white;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
font-weight:600;
}

.btn-main{
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
}

.btn-google{
background:white;
color:black;
}

/* SWITCH TEXT */
.switch{
text-align:center;
margin-top:10px;
font-size:13px;
}

.switch span{
color:#00c6ff;
cursor:pointer;
}

/* FOOTER */
footer{
position:fixed;
bottom:0;
width:100%;
padding:10px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
color:white;
text-align:center;
}

.footer-menu{
display:flex;
justify-content:space-around;
margin-bottom:5px;
}

.footer-menu a{
color:white;
text-decoration:none;
font-size:12px;
display:flex;
flex-direction:column;
align-items:center;
}

.footer-menu i{
font-size:16px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="wrap">
<div class="box">

<!-- LOGIN -->
<div id="login" class="form active">
<h2>Welcome Back!</h2>
<p>Login to continue</p>

<input type="text" placeholder="Username or Email">
<input type="password" placeholder="Password">

<button class="btn-main">Login</button>
<button class="btn-google">Continue with Google</button>

<div class="switch">
No account? <span onclick="showSignup()">Sign Up</span>
</div>
</div>

<!-- SIGNUP -->
<div id="signup" class="form">
<h2>Create Account</h2>
<p>Start earning today</p>

<input type="text" placeholder="Name">
<input type="email" placeholder="Email">

<input type="password" id="pass" placeholder="Password" oninput="checkStrength()">
<div id="strength" style="font-size:12px;"></div>

<input type="password" id="cpass" placeholder="Confirm Password">

<button class="btn-main" onclick="register()">Sign Up</button>
<button class="btn-google">Continue with Google</button>

<div class="switch">
Have account? <span onclick="showLogin()">Login</span>
</div>
</div>

</div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-menu">
    <a href="#"><i class="fa fa-circle-info"></i><span>About</span></a>
    <a href="#"><i class="fa fa-shield"></i><span>Privacy</span></a>
    <a href="#"><i class="fa fa-headset"></i><span>Support</span></a>
    <a href="#"><i class="fa fa-envelope"></i><span>Contact</span></a>
  </div>
  ⚡ Secure • Fast • Trusted earning platform
</footer>

<script>

/* SWITCH */
function showSignup(){
document.getElementById("login").classList.remove("active");
document.getElementById("signup").classList.add("active");
}

function showLogin(){
document.getElementById("signup").classList.remove("active");
document.getElementById("login").classList.add("active");
}

/* PASSWORD */
function checkStrength(){
let val=document.getElementById("pass").value;
let text=document.getElementById("strength");

if(val.length<6){
text.innerHTML="Weak 🔴";
text.style.color="red";
}
else if(val.match(/[A-Z]/) && val.match(/[0-9]/)){
text.innerHTML="Strong 🟢";
text.style.color="lime";
}
else{
text.innerHTML="Medium 🟡";
text.style.color="orange";
}
}

/* REGISTER */
function register(){
let pass=document.getElementById("pass").value;
let cpass=document.getElementById("cpass").value;

if(pass!==cpass){
alert("Password not match ❌");
return;
}

alert("Account Ready ✅");
}

/* THREE BG */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

const geo=new THREE.BufferGeometry();
const count=800;
const pos=new Float32Array(count*3);

for(let i=0;i<count*3;i++){
pos[i]=(Math.random()-0.5)*10;
}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
const mat=new THREE.PointsMaterial({size:0.02,color:0x00ffff});
const pts=new THREE.Points(geo,mat);

scene.add(pts);
camera.position.z=5;

function anim(){
requestAnimationFrame(anim);
pts.rotation.y+=0.001;
renderer.render(scene,camera);
}
anim();

</script>

</body>
</html>
