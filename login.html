<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealEarn - Login</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #1a1a1a;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      position: relative;
    }

    .glow {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #ff4d00, #ffaa00);
      opacity: 0.15;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 40px 30px;
    }

    h1 { color: white; font-size: 28px; margin-bottom: 8px; }
    p { color: #aaa; font-size: 15px; margin-bottom: 30px; }

    .forms-container {
      position: relative;
      height: 420px;
    }

    .form {
      position: absolute;
      width: 100%;
      transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      opacity: 0;
      transform: translateX(120%);
    }

    .form.active {
      opacity: 1;
      transform: translateX(0);
    }

    input {
      width: 100%;
      padding: 16px 18px;
      margin: 12px 0;
      background: #2a2a2a;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
    }
    input::placeholder { color: #777; }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      margin: 12px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-primary {
      background: linear-gradient(90deg, #ff4d00, #ff8800);
      color: white;
    }
    .btn-google {
      background: #fff;
      color: #333;
    }

    .switch-text {
      text-align: center;
      margin-top: 15px;
      color: #aaa;
    }
    .switch-text span {
      color: #ff8800;
      cursor: pointer;
      font-weight: 500;
    }

    .loader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.97);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .circle {
      width: 120px; height: 120px;
      border: 10px solid #333;
      border-top: 10px solid #ff8800;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }
    .percent {
      margin-top: 20px;
      font-size: 42px;
      font-weight: 700;
      color: #ff8800;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="glow"></div>
    <div class="content">

      <h1 id="title">Welcome Back!</h1>
      <p id="subtitle">Sign in to continue earning real money</p>

      <div class="forms-container">

        <!-- Login Form -->
        <div class="form active" id="loginForm">
          <input type="text" id="loginUser" placeholder="Username or Email">
          <input type="password" id="loginPass" placeholder="Password">
          <button class="btn btn-primary" onclick="handleEmailLogin()">Login</button>
          
          <button class="btn btn-google" onclick="signInWithGoogle('login')">
            <span style="font-size:22px;">G</span> Continue with Google
          </button>

          <div class="switch-text">
            Don't have an account? <span onclick="switchForm(1)">Sign Up</span>
          </div>
        </div>

        <!-- Register Form -->
        <div class="form" id="registerForm">
          <input type="text" id="regName" placeholder="Full Name">
          <input type="email" id="regEmail" placeholder="Email">
          <input type="password" id="regPass" placeholder="Password">
          <button class="btn btn-primary" onclick="handleEmailRegister()">Register</button>
          
          <button class="btn btn-google" onclick="signInWithGoogle('register')">
            <span style="font-size:22px;">G</span> Continue with Google
          </button>

          <div class="switch-text">
            Already have an account? <span onclick="switchForm(0)">Sign In</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="circle"></div>
    <div class="percent" id="percentText">0%</div>
    <p style="color:#888; margin-top:10px;">VERIFYING YOUR ACCOUNT...</p>
  </div>

  <script>
    // ================== YOUR FIREBASE CONFIG ==================
    const firebaseConfig = {
      apiKey: "AIzaSyCvhGuyx6ZSrimCjk2G2Q9pdoihvjb3Hms",
      authDomain: "realearn-app.firebaseapp.com",
      projectId: "realearn-app",
      storageBucket: "realearn-app.firebasestorage.app",
      messagingSenderId: "241034846565",
      appId: "1:241034846565:web:26f6da801689f429f9018c",
      measurementId: "G-WPH8TW221C"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    let currentForm = 'login';

    function switchForm(toRegister) {
      currentForm = toRegister ? 'register' : 'login';
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const title = document.getElementById('title');
      const subtitle = document.getElementById('subtitle');

      if (toRegister) {
        loginForm.classList.remove('active');
        registerForm.classList.add('active');
        title.textContent = "Create Account";
        subtitle.textContent = "Join thousands earning daily";
      } else {
        registerForm.classList.remove('active');
        loginForm.classList.add('active');
        title.textContent = "Welcome Back!";
        subtitle.textContent = "Sign in to continue earning real money";
      }
    }

    async function handleEmailLogin() {
      const email = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value.trim();
      if (!email || !pass) return alert("Please fill all fields");

      try {
        await auth.signInWithEmailAndPassword(email, pass);
        showLoaderAndRedirect();
      } catch (error) {
        alert("Login failed: " + error.message);
      }
    }

    async function handleEmailRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPass').value.trim();
      if (!name || !email || !pass) return alert("Please fill all fields");

      try {
        await auth.createUserWithEmailAndPassword(email, pass);
        showLoaderAndRedirect();
      } catch (error) {
        alert("Registration failed: " + error.message);
      }
    }

    async function signInWithGoogle(formType) {
      const provider = new firebase.auth.GoogleAuthProvider();

      try {
        const result = await auth.signInWithPopup(provider);
        const isNewUser = result.additionalUserInfo.isNewUser;

        if (formType === 'login' && isNewUser) {
          await auth.signOut();
          alert("No account found!\nPlease Sign Up first.");
          switchForm(1);
          return;
        }

        console.log("✅ Google Sign In Successful", result.user);
        showLoaderAndRedirect();

      } catch (error) {
        console.error(error);
        alert("Google Sign In failed: " + error.message);
      }
    }

    function showLoaderAndRedirect() {
      document.querySelector('.card').style.opacity = "0.3";
      const loader = document.getElementById('loader');
      loader.style.display = "flex";

      let percent = 0;
      const percentText = document.getElementById('percentText');

      const interval = setInterval(() => {
        percent += Math.random() * 15 + 8;
        if (percent > 100) percent = 100;
        percentText.textContent = Math.floor(percent) + "%";

        if (percent >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            window.location.href = "index.html";
          }, 700);
        }
      }, 80);
    }

    auth.onAuthStateChanged(user => {
      if (user) console.log("User already logged in:", user.email);
    });
  </script>
</body>
</html>
