<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Withdraw</title>

<!-- 🔹 GLOBAL CSS -->
<link rel="stylesheet" href="../style.css">

</head>

<body>

<!-- ===================================================== -->
<!-- 🔝 HEADER -->
<!-- ===================================================== -->
<header>
    <h2>Withdraw</h2>
</header>


<!-- ===================================================== -->
<!-- 💰 BALANCE SHOW -->
<!-- ===================================================== -->
<div class="balance-box">
    <h3>Your Balance</h3>
    <p id="balance">Loading...</p>
</div>


<!-- ===================================================== -->
<!-- 💸 WITHDRAW METHODS -->
<!-- ===================================================== -->

<div class="card">
    <h3>Select Withdraw Method</h3>

    <button onclick="openForm('bkash')">bKash</button>
    <button onclick="openForm('nagad')">Nagad</button>
    <button onclick="openForm('binance')">Binance</button>
</div>


<!-- ===================================================== -->
<!-- 🧾 POPUP FORM -->
<!-- ===================================================== -->

<div id="popup" class="popup">

    <div class="popup-content">

        <h3 id="methodTitle">Withdraw</h3>

        <!-- 👉 Number / Wallet -->
        <input type="text" id="number" placeholder="Enter Number / Wallet">

        <!-- 👉 Amount -->
        <input type="number" id="amount" placeholder="Enter Amount">

        <!-- 👉 Submit -->
        <button onclick="submitWithdraw()">Submit</button>

        <!-- 👉 Close -->
        <button onclick="closePopup()">Cancel</button>

    </div>

</div>


<!-- ===================================================== -->
<!-- 🔻 SCRIPT (ALL JS HERE) -->
<!-- ===================================================== -->

<script>

/* ===================================================== */
/* 🔹 USER ID */
/* ===================================================== */
let userId = localStorage.getItem("userId");

/* ===================================================== */
/* 🔗 BACKEND */
/* ===================================================== */
const API = "https://earn-system.onrender.com/api";


/* ===================================================== */
/* 📊 LOAD BALANCE */
/* ===================================================== */
async function loadBalance(){

    let res = await fetch(`${API}/user/${userId}`);
    let data = await res.json();

    document.getElementById("balance").innerText =
        data.balance.toFixed(2) + " BDT";
}


/* ===================================================== */
/* 📂 POPUP CONTROL */
/* ===================================================== */

let currentMethod = "";

function openForm(method){
    currentMethod = method;

    document.getElementById("popup").style.display = "flex";
    document.getElementById("methodTitle").innerText =
        method.toUpperCase() + " Withdraw";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}


/* ===================================================== */
/* 💸 SUBMIT WITHDRAW */
/* ===================================================== */

async function submitWithdraw(){

    let number = document.getElementById("number").value;
    let amount = parseFloat(document.getElementById("amount").value);

    if(!number || !amount){
        alert("Fill all fields");
        return;
    }

    if(amount < 200){
        alert("Minimum 200 BDT withdraw");
        return;
    }

    let res = await fetch(`${API}/withdraw`,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            id:userId,
            amount:amount,
            method:currentMethod,
            number:number
        })
    });

    let data = await res.json();

    if(data.success){
        alert("Withdraw request submitted ✅");
        closePopup();
    }else{
        alert(data.msg || "Error");
    }
}


/* ===================================================== */
/* 🚀 INIT */
/* ===================================================== */

loadBalance();

</script>


</body>
</html>
