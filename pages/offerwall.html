<html lang="en">

<!-- ===================================================== -->

<script>

/* ===================================================== */
/* 🔹 USER ID */
/* ===================================================== */

let userId = localStorage.getItem("userId");


/* ===================================================== */
/* 🎯 OFFERWALL LINK */
/* ===================================================== */

function openOfferwall(){
