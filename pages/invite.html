<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invite & Earn</title>

<!-- 🔹 GLOBAL CSS -->
<link rel="stylesheet" href="../style.css">

</head>

<body>

<!-- ===================================================== -->
<!-- 🔝 HEADER -->
<!-- ===================================================== -->
<header>
    <h2>Invite & Earn</h2>
</header>


<!-- ===================================================== -->
<!-- 💰 INFO -->
<!-- ===================================================== -->
<div class="balance-box">
    <h3>Invite Friends & Earn 💰</h3>
    <p>Earn 2 BDT per referral</p>
</div>


<!-- ===================================================== -->
<!-- 🔗 REFERRAL LINK -->
<!-- ===================================================== -->

<div class="card">

    <h3>Your Referral Link</h3>

    <input type="text" id="refLink" readonly>

    <button onclick="copyLink()">Copy Link</button>
    <button onclick="shareLink()">Share</button>

</div>


<!-- ===================================================== -->
<!-- 📜 INFO -->
<!-- ===================================================== -->

<div class="card">

    <h3>How it works?</h3>

    <p>
        1. Copy your link <br>
        2. Share with friends <br>
        3. They signup & use app <br>
        4. You earn 2 BDT 💰
    </p>

</div>


<!-- ===================================================== -->
<!-- 🔻 SCRIPT -->
<!-- ===================================================== -->

<script>

/* ===================================================== */
/* 🔹 USER ID */
/* ===================================================== */

let userId = localStorage.getItem("userId");


/* ===================================================== */
/* 🔗 GENERATE REF LINK */
/* ===================================================== */

let baseUrl = window.location.origin;

// 👉 final referral link
let refLink = baseUrl + "/?ref=" + userId;

document.getElementById("refLink").value = refLink;


/* ===================================================== */
/* 📋 COPY LINK */
/* ===================================================== */

function copyLink(){

    let input = document.getElementById("refLink");

    input.select();
    document.execCommand("copy");

    alert("Link Copied ✅");
}


/* ===================================================== */
/* 📤 SHARE LINK */
/* ===================================================== */

function shareLink(){

    if (navigator.share) {
        navigator.share({
            title: "Earn Money App",
            text: "Join and earn money 💰",
            url: refLink
        });
    } else {
        alert("Sharing not supported");
    }
}

</script>


</body>
</html>
