<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>History</title>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ===== BODY ===== */
body{
  font-family:sans-serif;
  background:#050505;
  color:white;
}

/* ===== HEADER ===== */
.header{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
}

.menuBtn{
  position:absolute;
  left:15px;
  font-size:22px;
  cursor:pointer;
}

.balance{
  position:absolute;
  right:15px;
  font-size:18px;
  font-weight:bold;
  background:linear-gradient(90deg,#00ffcc,#00ffff,#00ffcc);
  -webkit-background-clip:text;
  color:transparent;
}

/* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;
  left:-270px;
  top:0;
  width:270px;
  height:100%;
  background:#050505;
  padding:20px;
  transition:0.3s;
  z-index:2000;
}

.sidebar.active{ left:0; }

.sidebar h3{
  color:#00ffff;
  font-size:22px;
}

.sidebar a{
  display:block;
  margin:12px 0;
  padding:14px;
  background:#000;
  border-radius:10px;
  color:white;
  text-decoration:none;
}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
}
.overlay.active{display:block;}

/* ===== CONTENT ===== */
.container{
  padding:80px 15px 120px;
}

/* ===== CARD ===== */
.card{
  background:#0a1c1f;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

/* ===== STATUS ===== */
.status{
  font-size:13px;
  margin-top:5px;
}

.success{ color:#00ffcc; }
.pending{ color:orange; }
.rejected{ color:red; }

/* ===== NAV ===== */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:75px;
  background:#000;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav a{
  color:white;
  text-decoration:none;
  text-align:center;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Menu</h3>
  <a href="../withdraw.html">💸 Withdraw</a>
  <a href="history.html">📊 History</a>
  <a href="#">👤 Profile</a>
</div>

<div class="overlay" onclick="toggleMenu()" id="overlay"></div>

<!-- HEADER -->
<div class="header">
  <div class="menuBtn" onclick="toggleMenu()">☰</div>
  📊 History
  <div class="balance" id="balance">৳ 0</div>
</div>

<!-- CONTENT -->
<div class="container" id="historyList">

<div class="card">
No history found...
</div>

</div>

<!-- NAV -->
<div class="nav">
  <a href="task.html">📺<br>Task</a>
  <a href="offer.html">🎁<br>Offer</a>
  <a href="offerwall.html">🧩<br>Offerwall</a>
  <a href="extra.html">⚡<br>Extra</a>
</div>

<script>

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

const userId = localStorage.getItem("userId") || Date.now();
localStorage.setItem("userId", userId);

/* LOAD BALANCE */
async function loadUser(){
  try{
    const res = await fetch("/api/user/" + userId);
    const data = await res.json();
    document.getElementById("balance").innerText = "৳ " + data.balance;
  }catch{}
}
loadUser();

/* LOAD HISTORY */
async function loadHistory(){

  try{
    const res = await fetch("/api/history/" + userId);
    const data = await res.json();

    const container = document.getElementById("historyList");
    container.innerHTML = "";

    if(data.length === 0){
      container.innerHTML = `<div class="card">No history found...</div>`;
      return;
    }

    data.forEach(item => {

      let statusClass = "pending";

      if(item.status === "success") statusClass = "success";
      if(item.status === "rejected") statusClass = "rejected";

      container.innerHTML += `
        <div class="card">
          <b>৳ ${item.amount}</b> - ${item.type}
          <div class="status ${statusClass}">
            ${item.status.toUpperCase()}
          </div>
        </div>
      `;
    });

  }catch{
    document.getElementById("historyList").innerHTML =
      `<div class="card">Error loading history</div>`;
  }

}

loadHistory();

</script>

</body>
</html>
