<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Withdraw</title>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ===== BODY ===== */
body{
  font-family:sans-serif;
  background:#050505;
  color:white;
}

/* ===== HEADER ===== */
.header{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
}

.menuBtn{
  position:absolute;
  left:15px;
  font-size:22px;
  cursor:pointer;
}

.balance{
  position:absolute;
  right:15px;
  font-size:18px;
  font-weight:bold;
  background:linear-gradient(90deg,#00ffcc,#00ffff,#00ffcc);
  -webkit-background-clip:text;
  color:transparent;
}

/* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;
  left:-270px;
  top:0;
  width:270px;
  height:100%;
  background:#050505;
  padding:20px;
  transition:0.3s;
  z-index:2000;
}

.sidebar.active{ left:0; }

.sidebar h3{
  color:#00ffff;
  font-size:22px;
}

.sidebar a{
  display:block;
  margin:12px 0;
  padding:14px;
  background:#000;
  border-radius:10px;
  color:white;
  text-decoration:none;
}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
}
.overlay.active{display:block;}

/* ===== CONTENT ===== */
.container{
  padding:80px 15px 120px;
}

/* ===== CARD ===== */
.card{
  background:#0a1c1f;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* ===== INPUT ===== */
input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  background:#000;
  color:white;
  font-weight:bold;
}

/* ===== NAV ===== */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:75px;
  background:#000;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav a{
  color:white;
  text-decoration:none;
  text-align:center;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Menu</h3>
  <a href="../withdraw.html">💸 Withdraw</a>
  <a href="#">📊 History</a>
  <a href="#">👤 Profile</a>
</div>

<div class="overlay" onclick="toggleMenu()" id="overlay"></div>

<!-- HEADER -->
<div class="header">
  <div class="menuBtn" onclick="toggleMenu()">☰</div>
  💸 Withdraw
  <div class="balance" id="balance">৳ 0</div>
</div>

<!-- CONTENT -->
<div class="container">

<div class="card">
🔥 Minimum withdraw 100৳। সঠিক নাম্বার ও তথ্য দিয়ে রিকোয়েস্ট দিন। ২৪-৭২ ঘন্টার মধ্যে পেমেন্ট প্রসেস করা হবে।
</div>

<div class="card">

  <h4>Withdraw Request</h4>

  <select id="method">
    <option value="bkash">bKash</option>
    <option value="nagad">Nagad</option>
    <option value="binance">Binance</option>
  </select>

  <input type="text" id="account" placeholder="Enter Number / Wallet">

  <input type="number" id="amount" placeholder="Amount (৳)">

  <button onclick="submitWithdraw()">💸 Submit Request</button>

</div>

</div>

<!-- NAV -->
<div class="nav">
  <a href="task.html">📺<br>Task</a>
  <a href="offer.html">🎁<br>Offer</a>
  <a href="offerwall.html">🧩<br>Offerwall</a>
  <a href="extra.html">⚡<br>Extra</a>
</div>

<script>

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

const userId = localStorage.getItem("userId") || Date.now();
localStorage.setItem("userId", userId);

/* LOAD BALANCE */
async function loadUser(){
  try{
    const res = await fetch("/api/user/" + userId);
    const data = await res.json();
    document.getElementById("balance").innerText = "৳ " + data.balance;
  }catch{}
}
loadUser();

/* WITHDRAW */
async function submitWithdraw(){

  const method = document.getElementById("method").value;
  const account = document.getElementById("account").value;
  const amount = parseFloat(document.getElementById("amount").value);

  if(!account || !amount){
    alert("❌ Fill all fields");
    return;
  }

  if(amount < 100){
    alert("❌ Minimum withdraw 100৳");
    return;
  }

  const res = await fetch("/api/withdraw",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userId,method,account,amount})
  });

  const data = await res.json();

  if(data.success){
    alert("✅ Request Sent");
    loadUser();
  }else{
    alert(data.error);
  }
}

</script>

</body>
</html>
