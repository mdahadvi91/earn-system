<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ===== BODY ===== */
body{
  font-family:sans-serif;
  background:#050505;
  color:white;
}

/* ===== HEADER ===== */
.header{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
}

.menuBtn{
  position:absolute;
  left:15px;
  font-size:22px;
  cursor:pointer;
}

.balance{
  position:absolute;
  right:15px;
  font-size:18px;
  font-weight:bold;
  background:linear-gradient(90deg,#00ffcc,#00ffff,#00ffcc);
  background-size:200%;
  -webkit-background-clip:text;
  color:transparent;
  animation:glow 2s linear infinite;
}

@keyframes glow{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

/* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;
  left:-270px;
  top:0;
  width:270px;
  height:100%;
  background:#050505;
  padding:20px;
  transition:0.3s;
  z-index:2000;
}

.sidebar.active{
  left:0;
}

.sidebar h3{
  font-size:22px;
  color:#00ffff;
}

.sidebar a{
  display:block;
  margin:12px 0;
  padding:14px;
  background:#000;
  border-radius:10px;
  text-decoration:none;
  color:white;
  position:relative;
  overflow:hidden;
}

/* RGB */
.sidebar a::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(60deg,red,orange,yellow,lime,cyan,blue,violet,red);
  background-size:300%;
  animation:rgb 4s linear infinite;
  z-index:-1;
}

.sidebar a::after{
  content:"";
  position:absolute;
  inset:2px;
  background:#000;
  z-index:-1;
}

@keyframes rgb{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
}
.overlay.active{display:block;}

/* ===== CONTENT ===== */
.container{
  padding:80px 15px 120px;
}

/* ===== CARD ===== */
.card{
  background:#0a1c1f;
  padding:18px;
  border-radius:12px;
  margin-bottom:15px;
}

/* ===== INPUT ===== */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  background:#000;
  position:relative;
}

button::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(60deg,red,orange,yellow,lime,cyan,blue,violet,red);
  background-size:300%;
  animation:rgb 4s linear infinite;
  z-index:-1;
}

button::after{
  content:"";
  position:absolute;
  inset:2px;
  background:#000;
  z-index:-1;
}

/* ===== NAV ===== */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:75px;
  background:#000;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav a{
  color:white;
  text-decoration:none;
  font-size:16px;
  text-align:center;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Menu</h3>
  <a href="withdraw.html">💸 Withdraw</a>
  <a href="history.html">📊 History</a>
  <a href="profile.html">👤 Profile</a>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- HEADER -->
<div class="header">
  <div class="menuBtn" onclick="toggleMenu()">☰</div>
  👤 Profile
  <div class="balance" id="balance">৳ 0</div>
</div>

<!-- CONTENT -->
<div class="container">

  <!-- USER INFO -->
  <div class="card">
    <h3>👤 Account Info</h3>

    <p><b>User ID:</b> <span id="uid"></span></p>
    <p><b>Total Ads:</b> <span id="ads">0</span></p>
    <p><b>Total Earn:</b> ৳ <span id="earn">0</span></p>
  </div>

  <!-- UPDATE PROFILE -->
  <div class="card">
    <h3>⚙ Update Profile</h3>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">

    <button onclick="saveProfile()">💾 Save Profile</button>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <a href="task.html">📺<br>Task</a>
  <a href="offer.html">🎁<br>Offer</a>
  <a href="offerwall.html">🧩<br>Offerwall</a>
  <a href="extra.html">⚡<br>Extra</a>
</div>

<script>

/* ===== SIDEBAR ===== */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

/* ===== USER ===== */
const userId = localStorage.getItem("userId") || Date.now();
localStorage.setItem("userId", userId);

/* ===== LOAD USER ===== */
async function loadUser(){
  const res = await fetch("/api/user/" + userId);
  const data = await res.json();

  document.getElementById("balance").innerText = "৳ " + data.balance;
  document.getElementById("uid").innerText = userId;
  document.getElementById("ads").innerText = data.totalAds || 0;
  document.getElementById("earn").innerText = data.totalEarn || 0;
}
loadUser();

/* ===== SAVE PROFILE ===== */
async function saveProfile(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  const res = await fetch("/api/profile",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userId,name,email})
  });

  const data = await res.json();

  if(data.success){
    alert("✅ Profile Updated");
  }else{
    alert("❌ Error");
  }
}

</script>

</body>
</html>
