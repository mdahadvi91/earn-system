<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Earn</title>

<style>

/* ===== BODY ===== */
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:sans-serif;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
}

.balance{
  color:#00ffcc;
  font-weight:bold;
}

/* ===== CARD ===== */
.card{
  margin:15px;
  padding:20px;
  background:#111;
  border-radius:12px;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00ffff;
  color:black;
  margin-top:10px;
  font-weight:bold;
}

/* ===== FOOTER ===== */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.space{height:80px;}

</style>
</head>

<body>

<div class="header">
  <h3>📺 Task Earn</h3>
  <div class="balance" id="balance">৳ 0</div>
</div>

<div class="card">
  <h4>🔥 Complete 5 Ads</h4>
  <p id="progress">Progress: 0 / 5</p>

  <button onclick="watchAd()">▶ Watch Ad</button>
  <button id="claimBtn" onclick="claimReward()">💰 Claim Reward</button>
</div>

<div class="space"></div>

<div class="footer">
  <a href="../index.html">🏠</a>
  <a href="task.html">📺</a>
</div>

<script>

// ===== USER =====
const userId = localStorage.getItem("userId") || Date.now();
localStorage.setItem("userId", userId);

const deviceId = navigator.userAgent;
let count = 0;

// ===== LOAD USER =====
async function loadUser(){
  const res = await fetch("/api/user/" + userId);
  const data = await res.json();

  document.getElementById("balance").innerText = "৳ " + data.balance;

  count = data.totalAds % 5;

  document.getElementById("progress").innerText =
    "Progress: " + count + " / 5";

  updateClaimBtn(count);
}
loadUser();

// ===== CLAIM BUTTON CONTROL =====
function updateClaimBtn(count){
  const btn = document.getElementById("claimBtn");

  if(count < 5){
    btn.disabled = true;
    btn.style.opacity = 0.5;
  }else{
    btn.disabled = false;
    btn.style.opacity = 1;
  }
}

// ===== WATCH AD =====
function watchAd(){

  window.open("https://www.profitablecpmratenetwork.com/kxq650wd?key=11d1ec5f3d88b1d9689e0547e8b15dd1");

  let overlay = document.createElement("div");

  overlay.innerHTML = `
    <h2>⏳ Watching Ad...</h2>
    <h1 id="timer">15</h1>
    <button id="closeBtn" style="display:none;">Close</button>
  `;

  overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;flex-direction:column;align-items:center;justify-content:center;";

  document.body.appendChild(overlay);

  let time = 15;

  let t = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = time;

    if(time <= 0){
      clearInterval(t);
      document.getElementById("closeBtn").style.display = "block";
    }

  },1000);

  document.getElementById("closeBtn").onclick = async ()=>{

    const res = await fetch("/api/watch-ad",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({userId,deviceId})
    });

    const data = await res.json();

    if(data.success){
      alert("✅ Ad Done");
      loadUser();
    }

    overlay.remove();
  };
}

// ===== CLAIM =====
async function claimReward(){

  const res = await fetch("/api/claim-task",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userId})
  });

  const data = await res.json();

  if(data.success){
    alert("💰 Earned: ৳ " + data.reward);
    loadUser();
  }else{
    alert(data.error);
  }
}

</script>

</body>
</html>
