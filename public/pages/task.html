<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Earn</title>

<style>

/* ================= BODY ================= */
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:sans-serif;
}

/* ================= HEADER ================= */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111;
}

.balance{
  color:#00ffcc;
  font-weight:bold;
}

/* ================= CARD ================= */
.card{
  margin:15px;
  padding:20px;
  background:#111;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,255,255,0.2);
}

/* ================= BUTTON ================= */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00ffff;
  color:black;
  cursor:pointer;
  margin-top:10px;
  font-weight:bold;
}

/* ================= FOOTER NAV ================= */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid #222;
}

.footer a{
  color:white;
  text-decoration:none;
  font-size:12px;
  text-align:center;
}

/* ================= SPACING ================= */
.space{
  height:80px;
}

</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">
  <h3>📺 Task Earn</h3>
  <div class="balance" id="balance">৳ 0</div>
</div>

<!-- ================= TASK ================= -->
<div class="card">

  <h4>🔥 Complete 5 Ads</h4>
  <p>Watch ads & earn real money</p>

  <p id="progress">Progress: 0 / 5</p>

  <button id="watchBtn" onclick="watchAd()">▶ Watch Ad</button>

  <button onclick="claimReward()">💰 Claim Reward</button>

</div>

<div class="space"></div>

<!-- ================= FOOTER ================= -->
<div class="footer">
  <a href="../index.html">🏠<br>Home</a>
  <a href="task.html">📺<br>Task</a>
  <a href="offer.html">🎁<br>Offer</a>
  <a href="extra.html">💰<br>Extra</a>
</div>

<script>

/*
🔥 FULL INLINE SYSTEM
NO EXTERNAL FILE
NO ERROR
*/

// ================= USER =================
const userId = localStorage.getItem("userId") || Date.now();
localStorage.setItem("userId", userId);

const deviceId = navigator.userAgent;

let count = 0;

// ================= LOAD USER =================
async function loadUser(){
  try{
    const res = await fetch("/api/user/" + userId);
    const data = await res.json();

    document.getElementById("balance").innerText = "৳ " + data.balance;

    count = data.totalAds % 5;
    document.getElementById("progress").innerText =
      "Progress: " + count + " / 5";

  }catch{
    console.log("Load error");
  }
}
loadUser();

// ================= WATCH AD =================
function watchAd(){

  window.open(
    "https://www.profitablecpmratenetwork.com/kxq650wd?key=11d1ec5f3d88b1d9689e0547e8b15dd1",
    "_blank"
  );

  let timeLeft = 15;
  const btn = document.getElementById("watchBtn");

  btn.disabled = true;

  const timer = setInterval(()=>{
    timeLeft--;

    btn.innerText = "⏳ " + timeLeft + " sec";

    if(timeLeft <= 0){
      clearInterval(timer);

      btn.innerText = "❌ Close Ad";
      btn.disabled = false;
      btn.onclick = completeAd;
    }

  },1000);
}

// ================= COMPLETE =================
async function completeAd(){

  const btn = document.getElementById("watchBtn");
  btn.innerText = "Loading...";

  try{
    const res = await fetch("/api/watch-ad",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({userId, deviceId})
    });

    const data = await res.json();

    if(data.success){

      count = data.totalAds % 5;

      document.getElementById("progress").innerText =
        "Progress: " + count + " / 5";

      btn.innerText = "▶ Watch Ad";
      btn.onclick = watchAd;

      if(count === 0){
        alert("🎉 Task Complete! Claim now");
      }

    }else{
      alert(data.error || "Error");
    }

  }catch{
    alert("Server error");
  }
}

// ================= CLAIM =================
async function claimReward(){

  try{
    const res = await fetch("/api/claim-task",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({userId})
    });

    const data = await res.json();

    if(data.success){
      alert("💰 Earned: ৳ " + data.reward);

      document.getElementById("balance").innerText =
        "৳ " + data.balance;
    }else{
      alert(data.error);
    }

  }catch{
    alert("Server error");
  }
}

</script>

</body>
</html>
