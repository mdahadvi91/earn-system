<!DOCTYPE html>
<html>
<head>
<title>Task</title>
<style>
body{background:#000;color:#fff;font-family:sans-serif;text-align:center}
button{padding:15px;margin:10px;border:none;background:#0ff}
</style>
</head>

<body>

<h2>📺 Task Earn</h2>
<h3 id="balance">৳ 0</h3>

<p id="progress">0 / 5</p>

<button id="watchBtn" onclick="watchAd()">Watch Ad</button>
<button id="claimBtn" onclick="claim()" disabled>Claim</button>

<script>

const userId = localStorage.getItem("userId") || Date.now();
localStorage.setItem("userId",userId);

const deviceId = navigator.userAgent;

let count=0;

// load user
async function load(){
  const res = await fetch("/api/user/"+userId);
  const data = await res.json();

  document.getElementById("balance").innerText="৳ "+data.balance;

  count = data.totalAds % 5;
  if(count===0 && data.totalAds!==0) count=5;

  document.getElementById("progress").innerText=count+" / 5";

  document.getElementById("claimBtn").disabled = (count!==5);
}

load();

// watch ad
function watchAd(){

  window.open("https://www.profitablecpmratenetwork.com/kxq650wd?key=11d1ec5f3d88b1d9689e0547e8b15dd1");

  let t=15;
  const btn=document.getElementById("watchBtn");

  const timer=setInterval(()=>{
    t--;
    btn.innerText="Wait "+t;

    if(t<=0){
      clearInterval(timer);
      btn.innerText="Complete";
      btn.onclick=complete;
    }
  },1000);
}

// complete
async function complete(){

  const res = await fetch("/api/watch-ad",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userId,deviceId})
  });

  const data = await res.json();

  if(data.success){
    load();
    document.getElementById("watchBtn").innerText="Watch Ad";
    document.getElementById("watchBtn").onclick=watchAd;
  }else{
    alert(data.error);
  }
}

// claim
async function claim(){

  const res = await fetch("/api/claim-task",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userId})
  });

  const data = await res.json();

  if(data.success){
    alert("Earned "+data.reward);
    load();
  }else{
    alert(data.error);
  }
}

</script>

</body>
</html>
