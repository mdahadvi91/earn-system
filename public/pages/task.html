<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Earn</title>

<style>

/* 🔥 DESIGN */
body{
  background:#0a0a0a;
  color:white;
  font-family:sans-serif;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.balance{
  color:#00ffcc;
}

.card{
  margin:15px;
  padding:20px;
  background:#111;
  border-radius:12px;
}

button{
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00ffff;
  color:black;
  cursor:pointer;
  margin-top:10px;
}

</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">
  <h3>📺 Task Earn</h3>
  <div class="balance">৳ 0.00</div>
</div>

<!-- ================= TASK BOX ================= -->
<div class="card">

  <h4>Complete 5 Ads</h4>
  <p>Watch ads and earn real money</p>

  <!-- 🔥 PROGRESS -->
  <p id="progress">Progress: 0 / 5</p>

  <!-- 🔥 BUTTON -->
  <button id="watchBtn" onclick="watchAd()">▶ Watch Ad</button>

  <button onclick="claimReward()">💰 Claim Reward</button>

</div>

<script>

/*
🔥 PURPOSE:
Full working task system
*/

const userId = localStorage.getItem("userId") || Date.now();
localStorage.setItem("userId", userId);

const deviceId = navigator.userAgent;

let count = 0;

/* ================= LOAD USER ================= */
fetch("/api/user/" + userId);

/* ================= WATCH AD ================= */
function watchAd(){

  // open ad
  window.open(
    "https://www.profitablecpmratenetwork.com/kxq650wd?key=11d1ec5f3d88b1d9689e0547e8b15dd1",
    "_blank"
  );

  let timeLeft = 15;

  const btn = document.getElementById("watchBtn");

  btn.innerText = "⏳ " + timeLeft + " sec";

  const timer = setInterval(()=>{
    timeLeft--;

    btn.innerText = "⏳ " + timeLeft + " sec";

    if(timeLeft <= 0){
      clearInterval(timer);

      btn.innerText = "❌ Close Ad (Complete)";
      btn.onclick = completeAd;
    }

  },1000);
}

/* ================= COMPLETE AD ================= */
async function completeAd(){

  const btn = document.getElementById("watchBtn");
  btn.innerText = "Loading...";

  try{
    const res = await fetch("/api/watch-ad",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({userId, deviceId})
    });

    const data = await res.json();

    if(data.success){

      count = data.totalAds % 5;

      document.getElementById("progress").innerText =
        "Progress: " + count + " / 5";

      btn.innerText = "▶ Watch Ad";
      btn.onclick = watchAd;

      if(count === 0){
        alert("🎉 Task Complete! Now claim reward");
      }

    }else{
      alert(data.error || "Server error");
    }

  }catch(e){
    alert("Server error");
  }
}

/* ================= CLAIM ================= */
async function claimReward(){

  const res = await fetch("/api/claim-task",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userId})
  });

  const data = await res.json();

  if(data.success){
    alert("💰 Earned: ৳ " + data.reward);

    document.querySelector(".balance").innerText =
      "৳ " + data.balance;
  }else{
    alert(data.error);
  }
}

</script>

</body>
</html>
